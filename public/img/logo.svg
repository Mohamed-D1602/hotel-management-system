    <!-- tall sail -->
    <path d="M46 88 C44 56 50 30 68 12 C62 34 60 60 62 88 Z"/>
    <!-- forward sail -->
    <path d="M66 88 C68 62 76 44 94 32 C84 50 80 68 80 88 Z" opacity=".82"/>
    <!-- mast accent -->
    <path d="M40 88 C40 62 44 40 54 24 L57 26 C48 42 45 63 45 88 Z" opacity=".55"/>
    <!-- waterline -->
    <rect x="22" y="92" width="76" height="4" rx="2"/>
    <rect x="34" y="102" width="52" height="3" rx="1.5" opacity=".6"/>
  </g>
</svg>
